name: cnvkit
channels:
  - conda-forge
  - bioconda
dependencies:
  - python=3.11
  # Core dependencies (from requirements/core.txt)
  - bioframe>=0.8.0
  - biopython>=1.86
  - matplotlib>=3.10.7
  - numpy>=2.3.5
  - pandas>=2.3.3
  - pyfaidx>=0.8.1.3
  - pysam>=0.23.3
  - reportlab>=4.4.10
  - scikit-learn>=1.7.2
  - scipy>=1.16.3
  # R dependencies
  - r-base
  - bioconductor-dnacopy
  # Test dependencies (from requirements/tests.txt)
  - pytest
  - pytest-cov
  - pytest-xdist
  - coverage
  - hypothesis
  - ruff
  - safety
  - bandit
  # Development tools
  - debugpy
  - pip
