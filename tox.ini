[tox]
envlist =
    py3{14,13,12,11,10}
    py311-min
    py310-min
    lint
    typecheck
    security
    doc
#pypy38
skip_missing_interpreters = true

[testenv]
envtmpdir = {toxworkdir}/tmp/{envname}
deps =
    -r requirements/tests.txt
    -r requirements/core.txt
    min: -r requirements/min.txt
allowlist_externals = make
commands = pytest -v --tb=short -n auto --basetemp={envtmpdir} {posargs:test}

[testenv:lint]
package = wheel
wheel_build_env = .pkg
deps =
    ruff
commands =
    ruff check --select=E9,F63,F7,F82 skgenome cnvlib
    ruff check skgenome cnvlib

[testenv:typecheck]
package = wheel
wheel_build_env = .pkg
deps =
    mypy
commands =
    mypy {posargs:cnvlib skgenome}

[testenv:coverage]
package = wheel
wheel_build_env = .pkg
deps =
    coverage[all]
    -r requirements/tests.txt
    -r requirements/core.txt
commands =
    coverage run -m pytest test
    coverage report
    coverage xml

[testenv:security]
package = wheel
wheel_build_env = .pkg
deps =
    pip-audit
    bandit[toml]
# Upgrade pip itself so the audit doesn't trip on pip's own CVE-2026-6357
# (fixed in pip 26.1; older pip versions in the tox env are otherwise reported).
commands_pre =
    pip install --upgrade 'pip>=26.1'
# Suppressed vulnerabilities (re-evaluate when upstream fixes land):
#   PYSEC-2024-277 — joblib NumpyArrayWrapper.read_array() pickle
#     deserialization; no upstream fix as of joblib 1.5.3. cnvkit never
#     loads pickled data from untrusted sources, so not exploitable here.
#   CVE-2026-3219 — pip concatenated tar/zip handling; no upstream fix.
#     CI only installs from PyPI, so the untrusted-archive vector does not
#     apply to this workflow.
commands =
    pip-audit --ignore-vuln PYSEC-2024-277 --ignore-vuln CVE-2026-3219
    bandit -r cnvlib skgenome -s B101 -ll

[testenv:doc]
package = wheel
wheel_build_env = .pkg
deps = -r requirements/doc.txt
commands = sphinx-build -W -b html -d {envtmpdir}/doctrees doc {envtmpdir}/html

[testenv:build]
package = wheel
wheel_build_env = .pkg
deps = -r requirements/dev.txt
commands = python -m build .
